# -----------------------------------------------------------------------------
# Fixed-sequence stair climbing - Step-To gait (ST) (both feet per tread).
#
# Trigger: publish "stair_climb" on the target mode topic (/humanoid/target_mode).
# The plan is anchored at the moment the mode is selected: the robot settles for
# initial_stance_duration, walks up to the stairs on flat ground (approach
# strides), then climbs step by step with both feet per tread,
# and finally holds stance on the top step. Publish "base_twist" to leave the
# mode (only do this on a flat support!).
#
# The stairs section is GROUND TRUTH and must match the simulated staircase
# (description/g1/mujoco/stairs_params.yaml -> stairs.xml and the stairs links
# in g1_29dof_stairs.urdf).
# -----------------------------------------------------------------------------
stair_climbing:
  stairs:                       # world-frame staircase geometry (0th step frame)
    base_pos: [0.75, 0.0, 0.0]  # center of the 0th step at ground level
    yaw: 0.0                    # ascent direction about world +z [rad]
    start_offset: 0.0           # local +x offset from base_pos to the first riser
    heights: [0.10, 0.10, 0.10, 0.10, 0.10]   # riser height per step [m]
    depths:  [0.30, 0.30, 0.30, 0.30, 0.30]   # tread depth per step [m]
    width: 1.2                                # tread width along local y [m]

  gait:
    initial_stance_duration: 2.0  # settle before the first lift-off [s]
    swing_duration: 0.8           # single-support duration [s]
    stance_duration: 0.6          # double-support duration between swings [s]
    final_stance_duration: 1.0    # settle after the last touch-down [s]
    left_foot_first: true

  footholds:
    lateral_offset: 0.115     # |y| of each foot from the staircase centerline [m]
    tread_inset: 0.0          # foothold x offset from the tread center [m]
    approach_stride: 0.25     # flat-ground stride toward the stairs [m]
    approach_standoff: 0.15   # feet stop this far before the first riser [m]
    tracking_weight: 250.0    # swing-foot xy position tracking weight

  base:
    # Pelvis height above the MEAN foot support height. Keep low enough that the
    # rear (lower) leg can still reach during a tread transfer: rear-leg extension
    # is height_above_support + riser/2 and must stay below the ~0.79 m standing
    # height of the G1.
    height_above_support: 0.72