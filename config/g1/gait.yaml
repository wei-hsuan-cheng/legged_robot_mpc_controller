# Gait library
# Each gait is a mode sequence template: N modes and N+1 switching times

list: [stance, left_leg, right_leg, trot, fast_trot, slow_trot, slower_trot, walk, fast_walk, slow_walk, very_slow_walk, run, fast_run, skip, jump, terrain_walk]

stance:
  modeSequence: [STANCE]
  switchingTimes: [0.0, 0.5]

left_leg:
  modeSequence: [LF]
  switchingTimes: [0.0, 0.5]

right_leg:
  modeSequence: [RF]
  switchingTimes: [0.0, 0.5]

trot:
  modeSequence: [LF, RF]
  switchingTimes: [0.0, 0.5, 1.0]

fast_trot:
  modeSequence: [LF, RF]
  switchingTimes: [0.0, 0.4, 0.8]

slow_trot:
  modeSequence: [LF, RF]
  switchingTimes: [0.0, 0.55, 1.1]

slower_trot:
  modeSequence: [LF, RF]
  switchingTimes: [0.0, 0.6, 1.2]

walk:
  modeSequence: [LF, STANCE, RF, STANCE]
  switchingTimes: [0.0, 0.6, 0.7, 1.3, 1.4]

fast_walk:
  modeSequence: [LF, STANCE, RF, STANCE]
  switchingTimes: [0.0, 0.3, 0.5, 0.8, 1.0]

slow_walk:
  modeSequence: [LF, STANCE, RF, STANCE]
  switchingTimes: [0.0, 0.65, 0.85, 1.5, 1.7]

very_slow_walk:
  modeSequence: [RF, STANCE, LF, STANCE]
  switchingTimes: [0.0, 0.7, 1.1, 1.8, 2.2]

run:
  modeSequence: [LF, FLY, RF, FLY]
  switchingTimes: [0.0, 0.3, 0.4, 0.7, 0.8]

fast_run:
  modeSequence: [LF, FLY, RF, FLY]
  switchingTimes: [0.0, 0.3, 0.4, 0.7, 0.8]

skip:
  modeSequence: [LF, FLY, LF, RF, FLY, RF]
  switchingTimes: [0.0, 0.25, 0.3, 0.5, 0.75, 0.08, 1.0]

jump:
  modeSequence: [STANCE, FLY]
  switchingTimes: [0.0, 0.3, 0.5]

terrain_walk:
  modeSequence: [LF, STANCE, RF, STANCE]
  switchingTimes: [0.0, 0.9, 1.7, 2.6, 3.4]